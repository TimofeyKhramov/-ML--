#version: "3.8"
services: 
  app:
    build: ./app/
    image: event-planner-api:latest
    container_name: event-planner-api
    restart: no
    env_file:
    - ./app/.env
    volumes:
      - ./app:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - event-planner-network
  
  web-proxy:
      image: nginx:latest
      container_name: event-planner-nginx
      restart: unless-stopped
      ports:
        - "80:80"
        - "443:443"
      depends_on:
        app:
          condition: service_healthy
      volumes:
        - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
        # - ./nginx/ssl:/etc/nginx/ssl
      networks:
        - event-planner-network
  
  rabbitmq:
      image: rabbitmq:4.2.5-management-alpine
      container_name: container-rabbitmq
      restart: unless-stopped
      ports:
        - "5672"
        - "15672:15672"
      volumes:
        - ./rabbitmq_data:/var/lib/rabbitmq
      networks:
        - event-planner-network
  
  database:
      image: postgres:16-alpine
      container_name: container-database
      env_file:
      - ./database/.env
      restart: unless-stopped
      volumes:
        - ./postgres_data:/var/lib/postgresql/data # Локальная папка не удаляется при удалении контейнера
  
      networks:
        - event-planner-network
  
networks:
  event-planner-network:
    name: event-planner-network
    driver: bridge