#version: "3.8"
services: 
  app:
    build: ./app/
    image: event-planner-api:latest
    container_name: event-planner-api
    restart: no
    depends_on:
      - database
    env_file:
    - ./app/.env
    volumes:
      - ./app:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - event-planner-network

  
  web-proxy:
      image: nginx:1.29-alpine
      container_name: event-planner-nginx
      restart: unless-stopped
      ports:
        - "80:80"
        - "443:443"
      depends_on:
        - app
          
      volumes:
        - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
      networks:
      - event-planner-network
        # - ./nginx/ssl:/etc/nginx/ssl
     
  
  rabbitmq:
      image: rabbitmq:4.2.5-management-alpine
      container_name: container-rabbitmq
      restart: on-failure
      ports:
        - "5672:5672"
        - "15672:15672"
      volumes:
        - rabbitmq_volume:/var/lib/rabbitmq
      networks:
      - event-planner-network
    
  
  database:
      image: postgres:16-alpine
      container_name: container-database
      environment:
       - POSTGRES_DB=SERVICE  # ← Должно совпадать с DB_NAME
       - POSTGRES_USER=postgres
       - POSTGRES_PASSWORD=postgres
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d SERVICE"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s
      restart: unless-stopped
      volumes:
        - postgres_volume:/var/lib/postgresql/data 
      networks:
      - event-planner-network


volumes:
    rabbitmq_volume:    
    postgres_volume:

networks:
  event-planner-network:
    name: event-planner-network
    driver: bridge