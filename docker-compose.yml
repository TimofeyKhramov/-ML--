#version: "3.8"
services: 
  app:
    build: ./app/
    ports:
      - "8080:8080"
    image: event-planner-api:latest
    container_name: event-planner-api
    restart: unless-stopped
    depends_on:
      - database
    env_file:
    - ./app/.env
    volumes:
      - ./app:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - event-planner-network

  
  web-proxy:
      image: nginx:1.29-alpine
      container_name: event-planner-nginx
      restart: unless-stopped
      ports:
        - "80:80"
        - "443:443"
      depends_on:
        - app
          
      volumes:
        - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
      networks:
      - event-planner-network
        
  rabbitmq:
      image: rabbitmq:3.13.1-management-alpine
      container_name: container-rabbitmq
      restart: on-failure
      hostname: rabbitmq
      environment:
        - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
        - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
        - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit disk_free_limit 2147483648
      ports:
        - "5672:5672"
        - "15672:15672"
      healthcheck:
        test: ["CMD", "rabbitmq-diagnostics", "check_running"]
        interval: 30s
        timeout: 10s
        retries: 3
      volumes:
        - rabbitmq_volume:/var/lib/rabbitmq
      networks:
      - event-planner-network
    
  ml_worker_1:
    build: ./ml_worker/
    image: event-planner-ml-worker:latest
    container_name: event-planner-ml-worker-1
    restart: unless-stopped
    environment:
      - WORKER_ID=1
    env_file:
      - ./ml_worker/.env
    volumes:
      - ./ml_worker:/app
    depends_on:
      database:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - event-planner-network
  
  ml_worker_2:
    build: ./ml_worker/
    image: event-planner-ml-worker:latest
    container_name: event-planner-ml-worker-2
    restart: unless-stopped
    environment:
      - WORKER_ID=2
    env_file:
      - ./ml_worker/.env
    volumes:
      - ./ml_worker:/app
    depends_on:
      database:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - event-planner-network

  ollama:
    image: ollama/ollama
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_volume:/var/lib/ollama/data 
    restart: unless-stopped
    networks:
      - event-planner-network

  database:
      image: postgres:16-alpine
      container_name: container-database
      environment:
       - POSTGRES_DB=${POSTGRES_DB}  
       - POSTGRES_USER=${POSTGRES_USER}
       - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d SERVICE"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s
      restart: unless-stopped
      volumes:
        - postgres_volume:/var/lib/postgresql/data 
      networks:
      - event-planner-network

 
volumes:
  rabbitmq_volume:
  postgres_volume:
  ollama_volume:
  mlworker_volume:
   

networks:
  event-planner-network:
    name: event-planner-network
    driver: bridge