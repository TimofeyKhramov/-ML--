#version: "3.8"
services: 
  app:
    build: ./app/
    image: event-planner-api:latest
    container_name: event-planner-api
    restart: no
    env_file:
    - ./app/.env
    volumes:
      - ./app:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  
  web-proxy:
      image: nginx:1.29-alpine
      container_name: event-planner-nginx
      restart: unless-stopped
      ports:
        - "80:80"
        - "443:443"
      depends_on:
        app:
          condition: service_healthy
      volumes:
        - ./web-proxy/nginx.conf:/etc/nginx/nginx.conf
        # - ./nginx/ssl:/etc/nginx/ssl
     
  
  rabbitmq:
      image: rabbitmq:4.2.5-management-alpine
      container_name: container-rabbitmq
      restart: on-failure
      ports:
        - "5672:5672"
        - "15672:15672"
      volumes:
        - rabbitmq_volume:/var/lib/rabbitmq
    
  
  database:
      image: postgres:16-alpine
      container_name: container-database
      env_file:
      - ./database/.env
      restart: unless-stopped
      volumes:
        - postgres_volume:/var/lib/postgresql/data 


volumes:
    rabbitmq_volume:    
    postgres_volume:

